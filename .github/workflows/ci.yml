name: CI

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linter
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run lint
        run: |
          ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libdbus-1-3 \
            libxkbcommon-x11-0 \
            libx11-xcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxrender1 \
            libxi6 \
            libxtst6 \
            xauth \
            xvfb \
            xdotool

      - name: Run Headless Tests
        working-directory: project
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pytest -v -m "not physical_gui"

      - name: Run Physical GUI Tests
        working-directory: project
        env:
          QT_QPA_PLATFORM: xcb
        run: |
          xvfb-run -a --server-args="-screen 0 1920x1080x24" pytest -v -m physical_gui
  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy step
        run: echo "Deploy step placeholder"
